services:
  - type: web
    name: khl-sticker-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: khl-sticker-bot
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PORT
        value: 8080

